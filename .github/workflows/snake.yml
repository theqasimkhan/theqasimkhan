name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # allows manual trigger from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # required to push to the output branch

    steps:
      # Step 1: Generate the snake SVGs into the dist/ folder
      - uses: Platane/snk@v3
        with:
          github_user_name: theqasimkhan
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Push dist/ contents to the output branch
      # JamesIves/github-pages-deploy-action@v4 replaces the deprecated
      # crazy-max/ghaction-github-pages@v3 and supports Node.js 24
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          clean: false      # keep existing files on the branch
