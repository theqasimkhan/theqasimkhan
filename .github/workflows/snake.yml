name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Uses the Docker sub-action — no Node.js dependency, immune to Node deprecation
      - uses: Platane/snk/action_generate@v3
        with:
          github_user_name: theqasimkhan
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Verify files were actually generated before attempting push
      - name: Verify output
        run: ls -la dist/

      # Push dist/ to the output branch
      - name: Push to output branch
        run: |
          cd dist
          git init -b output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/theqasimkhan/theqasimkhan.git"
          git add .
          git commit -m "chore: regenerate snake [skip ci]"
          git push --force origin output
