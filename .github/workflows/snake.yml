name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: theqasimkhan
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify snake files exist
        run: |
          echo "=== Workspace root ==="
          ls -la
          echo "=== dist/ folder ==="
          ls -la dist/ 2>/dev/null || echo "PROBLEM: dist/ was not created — snake generation failed"
          echo "=== SVG files ==="
          find . -name "*.svg" 2>/dev/null || echo "No SVG files found anywhere"

      - name: Push to output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ ! -f "dist/github-contribution-grid-snake.svg" ]; then
            echo "ERROR: SVG files missing — skipping push"
            exit 1
          fi
          cd dist
          git init -b output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/theqasimkhan/theqasimkhan.git"
          git add .
          git commit -m "chore: regenerate snake [skip ci]"
          git push --force origin output
          echo "SUCCESS: Snake pushed to output branch"
